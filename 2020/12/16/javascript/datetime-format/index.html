nt"> * 时间格式化插件</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@param <span class="type">&#123;*&#125;</span> </span>date 时间(可以传入时间戳)</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@param <span class="type">&#123;*&#125;</span> </span>format 格式</span></span><br><span class="line"><span class="comment"> * YYYY-MM-DD(yyyy-MM-dd)</span></span><br><span class="line"><span class="comment"> * HH:mm:ss hh:mm:ss  &quot;H: 24小时计时  h: 12小时计时&quot;</span></span><br><span class="line"><span class="comment"> * 星期W 第Q季度</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="keyword">export</span> <span class="function"><span class="keyword">function</span> <span class="title">TimeFormater</span>(<span class="params">date, format</span>) </span>&#123;</span><br><span class="line">  date = date || <span class="keyword">new</span> <span class="built_in">Date</span>();</span><br><span class="line">  format = format || <span class="string">&quot;YYYY-MM-DD&quot;</span>;</span><br><span class="line">  <span class="comment">// 转换毫秒和字符串为时间对象</span></span><br><span class="line">  <span class="keyword">if</span> (<span class="keyword">typeof</span> date === <span class="string">&quot;string&quot;</span>) &#123;</span><br><span class="line">    <span class="keyword">if</span> (<span class="regexp">/^\d+$/</span>.test(date)) &#123;</span><br><span class="line">      date = <span class="built_in">parseInt</span>(date);</span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">      <span class="comment">// 处理日期兼容(火狐和safari浏览器)</span></span><br><span class="line">      date = date.replace(<span class="keyword">new</span> <span class="built_in">RegExp</span>(<span class="regexp">/-/gm</span>), <span class="string">&quot;/&quot;</span>);</span><br><span class="line">    &#125;</span><br><span class="line">  &#125; <span class="keyword">else</span> <span class="keyword">if</span> (<span class="keyword">typeof</span> date === <span class="string">&quot;number&quot;</span> &amp;&amp; date.toString().length === <span class="number">10</span>) &#123;</span><br><span class="line">    date = date * <span class="number">1000</span>;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">let</span> d = <span class="keyword">new</span> <span class="built_in">Date</span>(date);</span><br><span class="line">  <span class="comment">// d是NaN的时候返回空</span></span><br><span class="line">  <span class="keyword">if</span> (<span class="built_in">isNaN</span>(d)) <span class="keyword">return</span> <span class="string">&quot;&quot;</span>;</span><br><span class="line"></span><br><span class="line">  <span class="function"><span class="keyword">function</span> <span class="title">fillZero</span>(<span class="params">num</span>) </span>&#123;</span><br><span class="line">    <span class="keyword">return</span> num.toString().padStart(<span class="number">2</span>, <span class="string">&quot;0&quot;</span>);</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">const</span> WEEK_DISPLAY = [<span class="string">&quot;日&quot;</span>, <span class="string">&quot;一&quot;</span>, <span class="string">&quot;二&quot;</span>, <span class="string">&quot;三&quot;</span>, <span class="string">&quot;四&quot;</span>, <span class="string">&quot;五&quot;</span>, <span class="string">&quot;六&quot;</span>];</span><br><span class="line">  <span class="keyword">const</span> formatObj = &#123;</span><br><span class="line">    YYYY: d.getFullYear(), <span class="comment">// 年</span></span><br><span class="line">    yyyy: d.getFullYear(), <span class="comment">// 年</span></span><br><span class="line">    MM: fillZero(d.getMonth() + <span class="number">1</span>), <span class="comment">// 月份 [01..12]</span></span><br><span class="line">    M: d.getMonth() + <span class="number">1</span>, <span class="comment">// 月份 [1..12]</span></span><br><span class="line">    DD: fillZero(d.getDate()), <span class="comment">// 日期 [01..31]</span></span><br><span class="line">    D: d.getDate(), <span class="comment">// 日期 [1..31]</span></span><br><span class="line">    dd: fillZero(d.getDate()), <span class="comment">// 日期 [01..31]</span></span><br><span class="line">    d: d.getDate(), <span class="comment">// 日期 [1..31]</span></span><br><span class="line">    W: WEEK_DISPLAY[d.getDay()], <span class="comment">// 星期</span></span><br><span class="line">    hh: fillZero(d.getHours() % <span class="number">12</span> || <span class="number">12</span>), <span class="comment">// 时 [01..12]</span></span><br><span class="line">    h: d.getHours() % <span class="number">12</span> || <span class="number">12</span>, <span class="comment">// 时 [1.12]</span></span><br><span class="line">    HH: fillZero(d.getHours()), <span class="comment">// 时 [00..23]</span></span><br><span class="line">    H: d.getHours(), <span class="comment">// 时 [0..23]</span></span><br><span class="line">    mm: fillZero(d.getMinutes()), <span class="comment">// 分钟 [00..59]</span></span><br><span class="line">    m: d.getMinutes(), <span class="comment">// 分钟 [0..59]</span></span><br><span class="line">    ss: fillZero(d.getSeconds()), <span class="comment">// 秒 [00..59]</span></span><br><span class="line">    s: d.getSeconds(), <span class="comment">// 秒 [0..59]</span></span><br><span class="line">    S: d.getMilliseconds(), <span class="comment">// 毫秒</span></span><br><span class="line">    Q: <span class="built_in">Math</span>.ceil((d.getMonth() + <span class="number">1</span>) / <span class="number">3</span>), <span class="comment">// 季度</span></span><br><span class="line">    x: d.getTime(), <span class="comment">// 时间戳，单位：毫秒</span></span><br><span class="line">    X: <span class="built_in">Math</span>.floor(d.getTime() / <span class="number">1000</span>) <span class="c
