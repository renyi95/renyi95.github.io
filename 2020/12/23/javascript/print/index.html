</span><br><span class="line">  <span class="keyword">if</span> (<span class="keyword">typeof</span> dom === <span class="string">&quot;string&quot;</span>) &#123;</span><br><span class="line">    <span class="built_in">this</span>.dom = <span class="built_in">document</span>.querySelector(dom);</span><br><span class="line">  &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">    <span class="built_in">this</span>.isDOM(dom);</span><br><span class="line">    <span class="built_in">this</span>.dom = <span class="built_in">this</span>.isDOM(dom) ? dom : dom.$el;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="built_in">this</span>.init();</span><br><span class="line">&#125;;</span><br><span class="line">Print.prototype = &#123;</span><br><span class="line">  init: <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">    <span class="keyword">var</span> content = <span class="built_in">this</span>.getStyle() + <span class="built_in">this</span>.getHtml();</span><br><span class="line">    <span class="built_in">this</span>.writeIframe(content);</span><br><span class="line">  &#125;,</span><br><span class="line">  extend: <span class="function"><span class="keyword">function</span> (<span class="params">obj, obj2</span>) </span>&#123;</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">var</span> k <span class="keyword">in</span> obj2) &#123;</span><br><span class="line">      obj[k] = obj2[k];</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> obj;</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  getStyle: <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">    <span class="keyword">var</span> str = <span class="string">&quot;&quot;</span>,</span><br><span class="line">      styles = <span class="built_in">document</span>.querySelectorAll(<span class="string">&quot;style,link&quot;</span>);</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">var</span> i = <span class="number">0</span>; i &lt; styles.length; i++) &#123;</span><br><span class="line">      str += styles[i].outerHTML;</span><br><span class="line">    &#125;</span><br><span class="line">    str +=</span><br><span class="line">      <span class="string">&quot;&lt;style&gt;&quot;</span> +</span><br><span class="line">      (<span class="built_in">this</span>.options.noPrint ? <span class="built_in">this</span>.options.noPrint : <span class="string">&quot;.no-print&quot;</span>) +</span><br><span class="line">      <span class="string">&quot;&#123;display:none;&#125;&lt;/style&gt;&quot;</span>;</span><br><span class="line">    str +=</span><br><span class="line">      <span class="string">&quot;&lt;style&gt; table &#123;border: 1px solid #000;&#125; .el-table__header &#123;border: 1px solid #000;border-bottom: none;&#125; .el-table__body &#123;border-top: none;&#125; .el-table td, .el-table th.is-leaf &#123;border: 1px solid #000; border-right: 1px solid #000;&#125;  .print-title-content &#123;display:block !important;&#125; #backBtn &#123;display:none;&#125; #img-wrapper &#123;display:block !important;&#125; #echarts &#123;display:none;&#125; .box-card &#123;border: 1px solid #000;&#125; .el-tabs__header &#123;display:none !important;&#125;&lt;/style&gt;&quot;</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> str;</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  getHtml: <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">    <span class="keyword">var</span> inputs = <span class="built_in">document</span>.querySelectorAll(<span class="string">&quot;input&quot;</span>);</span><br><span class="line">    <span class="keyword">var</span> textareas = <span class="built_in">document</span>.querySelectorAll(<span class="string">&quot;textarea&quot;</span>);</span><br><span class="line">    <span class="keyword">var</span> selects = <span class="built_in">document</span>.querySelectorAll(<span class="string">&quot;select&quot;</span>);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">var</span> k = <span class="number">0</span>; k &lt; inputs.length; k++) &#123;</span><br><span class="line">      <span class="keyword">if</span> (inputs[k].type == <span class="string">&quot;checkbox&quot;</span> || inputs[k].type == <span class="string">&quot;radio&quot;</span>) &#123;</span><br><span class="line">        <span class="keyword">if</span> (inputs[k].checked == <span class="literal">true</span>) &#123;</span><br><span class="line">          inputs[k].setAttribute(<span class="string">&quot;checked&quot;</span>, <span class="string">&quot;checked&quot;</span>);</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">          inputs[k].removeAttribute(<span class="string">&quot;checked&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">      &#125; <span class="keyword">else</span> <span class="keyword">if</span> (inputs[k].type == <span class="string">&quot;text&quot;</span>) &#123;</span><br><span class="line">        inputs[k].setAttribute(<span class="string">&quot;value&quot;</span>, inputs[k].value);</span><br><span class="line">      &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">        inputs[k].setAttribute(<span class="string">&quot;value&quot;</span>, inputs[k].value);</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">var</span> k2 = <span class="number">0</span>; k2 &lt; textareas.length; k2++) &#123;</span><br><span class="line">      <span class="keyword">if</span> (textareas[k2].type == <span class="string">&quot;textarea&quot;</span>) &#123;</span><br><span class="line">        textareas[k2].innerHTML = textareas[k2].value;</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">var</span> k3 = <span class="number">0</span>; k3 &lt; selects.length; k3++) &#123;</span><br><span class="line">      <span class="keyword">if</span> (selects[k3].type == <span class="string">&quot;select-one&quot;</span>) &#123;</span><br><span class="line">        <span class="keyword">var</span> child = selects[k3].children;</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">var</span> i <span class="keyword">in</span> child) &#123;</span><br><span class="line">          <span class="keyword">if</span> (child[i].tagName == <span class="string">&quot;OPTION&quot;</span>) &#123;</span><br><span class="line">            <span class="keyword">if</span> (child[i].selected == <span class="literal">true</span>) &#123;</span><br><span class="line">              child[i].setAttribute(<span class="string">&quot;selected&quot;</span>, <span class="string">&quot;selected&quot;</span>);</span><br><span class="line">            &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">              child[i].removeAttribute(<span class="string">&quot;selected&quot;</span>);</span><br><span class="line">            &#125;</span><br><span class="line">          &#125;</span><br><span class="line">        &#125;</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="built_in">this</span>.dom.outerHTML;</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  writeIframe: <span class="function"><span class="keyword">function</span> (<span class="params">content</span>) </span>&#123;</span><br><span class="line">    <span class="keyword">var</span> w,</span><br><span class="line">      doc,</span><br><span class="line">      iframe = <span class="built_in">document</span>.createElement(<span class="string">&quot;iframe&quot;</span>),</span><br><span class="line">      f = <span class="built_in">document</span>.body.appendChild(iframe);</span><br><span class="line">    iframe.id = <span class="string">&quot;myIframe&quot;</span>;</span><br><span class="line">    <span class="comment">//iframe.style = &quot;position:absolute;width:0;height:0;top:-10px;left:-10px;&quot;;</span></span><br><span class="line">    iframe.setAttribute(</span><br><span class="line">      <span class="string">&quot;style&quot;</span>,</span><br><span class="line">      <span class="string">&quot;position:absolute;width:0;height:0;top:-10px;left:-10px;&quot;</span></span><br><span class="line">    );</span><br><span class="line">    w = f.contentWindow || f.contentDocument;</span><br><span class="line">    doc = f.contentDocument || f.contentWindow.document;</span><br><span class="line">    doc.open();</span><br><span class="line">    doc.write(content);</span><br><span class="line">    doc.close();</span><br><span class="line">    <span class="keyword">var</span> _this = <span class="built_in">this</span>;</span><br><span class="line">    iframe.onload = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">      _this.toPrint(w);</span><br><span class="line">      <span class="built_in">setTimeout</span>(<span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">        <span class="built_in">document</span>.body.removeChild(iframe);</span><br><span class="line">      &#125;, <span class="number">100</span>);</span><br><span class="line">    &#125;;</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  toPrint: <span class="function"><span class="keyword">function</span> (<span class="params">frameWindow</span>) </span>&#123;</span><br><span class="line">    <span class="keyword">try</span> &#123;</span><br><span class="line">      <span class="built_in">setTimeout</span>(<span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">        frameWindow.focus();</span><br><span class="line">        <span class="keyword">try</span> &#123;</span><br><span class="line">          <span class="keyword">if</span> (!frameWindow.document.execCommand(<span class="string">&quot;print&quot;</span>, <span class="literal">false</span>, <span class="literal">null</span>)) &#123;</span><br><span class="line">            frameWindow.print();</span><br><span class="line">          &#125;</span><br><span class="line">        &#125; <span class="keyword">catch</span> (e) &#123;</span><br><span class="line">          frameWindow.print();</span><br><span class="line">        &#125;</span><br><span class="line">        frameWindow.close();</span><br><span class="line">      &#125;, <span class="number">10</span>);</span><br><span class="line">    &#125; <span class="keyword">catch</span> (err) &#123;</span><br><span class="line">      <span class="built_in">console</span>.log(<span class="string">&quot;err&quot;</span>, err);</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;,</span><br><span class="line">  isDOM:</span><br><span class="line">    <span class="keywo
